<canvas id="canvas"></canvas>

<div class="pointer-events-none fixed left-1/2 top-4 z-40 w-[min(96vw,980px)] -translate-x-1/2 px-2">
  <div
    class="pointer-events-auto rounded-2xl border border-emerald-300/30 bg-slate-950/85 p-2 shadow-2xl backdrop-blur-xl sm:p-3"
  >
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="flex flex-wrap items-center gap-2">
        <button
          class="{{ drawingSelected ? 'bg-emerald-400 text-slate-950' : 'bg-slate-800 text-slate-100 hover:bg-slate-700' }} rounded-full px-3 py-2 text-sm shadow-lg transition-all"
          (click)="handleSelectDraw()"
          title="Draw mode"
        >
          <nz-icon nzTheme="outline" nzType="edit" />
        </button>

        <button
          class="{{ textSelected ? 'bg-emerald-400 text-slate-950' : 'bg-slate-800 text-slate-100 hover:bg-slate-700' }} rounded-full px-3 py-2 text-sm shadow-lg transition-all"
          (click)="handleSelectText()"
          title="Text mode"
        >
          <nz-icon nzType="file-text" nzTheme="outline" />
        </button>

        <button
          class="rounded-full bg-slate-800 px-3 py-2 text-sm text-slate-100 shadow-lg transition-all hover:bg-slate-700 active:bg-rose-500 active:text-white"
          (click)="handleSelectErase()"
          title="Delete selection"
        >
          <nz-icon nzType="clear" nzTheme="outline" />
        </button>

        <div class="mx-1 hidden h-6 w-px bg-slate-700 sm:block"></div>

        <label class="flex items-center gap-2 rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1 text-xs font-semibold uppercase tracking-[0.12em] text-slate-200">
          Color
          <nz-color-picker
            nzSize="small"
            nzTrigger="hover"
            [(ngModel)]="strokeColor"
            nzDisabledAlpha
            (click)="handleColorChange()"
            class="rounded-full border border-slate-600 bg-slate-900 px-[3px] py-[2.5px] shadow-lg"
          ></nz-color-picker>
        </label>
      </div>

      <div class="flex items-center gap-2">
        <div class="mr-1 flex items-center gap-1 rounded-full border border-slate-700 bg-slate-800/80 px-2 py-1 text-xs text-slate-200">
          <button
            class="rounded-full px-2 py-1 hover:bg-slate-700"
            (click)="zoomOut()"
            title="Zoom out"
          >
            <nz-icon nzType="minus" nzTheme="outline" />
          </button>
          <span class="min-w-12 text-center font-semibold">{{ zoomPercent }}%</span>
          <button
            class="rounded-full px-2 py-1 hover:bg-slate-700"
            (click)="zoomIn()"
            title="Zoom in"
          >
            <nz-icon nzType="plus" nzTheme="outline" />
          </button>
          <button
            class="rounded-full px-2 py-1 hover:bg-slate-700"
            (click)="resetZoom()"
            title="Reset zoom"
          >
            <nz-icon nzType="border-outer" nzTheme="outline" />
          </button>
        </div>
        <span class="hidden text-xs text-slate-300 sm:inline">Hold Space + Drag to pan</span>

        <button
          class="rounded-full bg-slate-800 px-3 py-2 text-sm text-slate-100 shadow-lg transition-all hover:bg-rose-500 hover:text-white"
          (click)="clearCanvas()"
          title="Clear canvas"
        >
          <nz-icon nzType="delete" nzTheme="outline" />
        </button>
        <button
          (click)="open()"
          class="{{ visible ? 'bg-emerald-400 text-slate-950' : 'bg-slate-800 text-slate-100 hover:bg-slate-700' }} rounded-full px-3 py-2 text-sm shadow-lg transition-all"
          title="Room info"
        >
          <nz-icon nzType="wechat" nzTheme="outline" />
        </button>
      </div>
    </div>
  </div>
</div>

<nz-drawer
  [nzClosable]="true"
  [nzVisible]="visible"
  nzPlacement="right"
  [nzTitle]="roomName"
  (nzOnClose)="close()"
>
  <ng-container *nzDrawerContent>
    <div class="space-y-3">
      <p class="text-sm text-slate-400">Room code</p>
      <div class="flex flex-wrap items-center gap-2">
        <p class="inline-flex rounded-lg border border-emerald-300/30 bg-emerald-300/10 px-3 py-2 font-semibold text-emerald-100">
          {{ roomCode }}
        </p>
        <button
          type="button"
          class="rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-xs font-semibold uppercase tracking-[0.08em] text-slate-100 transition hover:border-emerald-300/50 hover:text-emerald-200"
          (click)="copyRoomCode()"
          [disabled]="!roomCode"
        >
          {{ copyCodeLabel }}
        </button>
      </div>
    </div>
  </ng-container>
</nz-drawer>
