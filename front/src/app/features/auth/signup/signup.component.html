<section class="bc-page min-h-[calc(100vh-5.5rem)] sm:min-h-[calc(100vh-6rem)] flex items-center">
  <div class="bc-orb -left-16 top-24 h-64 w-64 bg-emerald-500/20"></div>
  <div class="bc-orb -right-24 top-24 h-80 w-80 bg-cyan-400/20"></div>

  <div class="bc-container relative w-full py-6">
    <div class="mx-auto grid max-w-5xl overflow-hidden rounded-3xl border border-emerald-200/20 bg-slate-950/60 shadow-2xl backdrop-blur lg:grid-cols-2">
      <div class="bg-slate-950/80 p-6 sm:p-10">
        <form [formGroup]="formGroup" (submit)="onSubmit()" class="space-y-5">
          <div>
            <p class="bc-kicker">New workspace</p>
            <h1 class="mt-2 text-3xl font-semibold text-white">Create your account</h1>
            <p class="mt-2 text-sm text-slate-400">Set up your profile and start collaborating in minutes.</p>
            @if (error) {
              <p class="mt-3 rounded-lg border border-rose-300/40 bg-rose-300/10 px-3 py-2 text-sm text-rose-100">
                {{ error }}
              </p>
            }
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="bc-label" for="username">Username</label>
              <input
                id="username"
                formControlName="username"
                placeholder="yourname"
                type="text"
                class="bc-input"
              />
            </div>

            <div>
              <label class="bc-label" for="email">Email</label>
              <input
                id="email"
                formControlName="email"
                placeholder="name@company.com"
                class="bc-input"
                type="email"
              />
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="bc-label" for="password">Password</label>
              <input
                id="password"
                formControlName="password"
                placeholder="At least 6 characters"
                class="bc-input"
                type="password"
              />
            </div>

            <div>
              <label class="bc-label" for="rePassword">Repeat password</label>
              <input
                id="rePassword"
                formControlName="rePassword"
                placeholder="Repeat your password"
                class="bc-input"
                type="password"
              />
            </div>
          </div>

          <button
            type="submit"
            class="bc-btn-primary w-full rounded-xl py-3 text-base"
          >
            Create account
          </button>
        </form>
      </div>

      <div class="hidden flex-col justify-between bg-gradient-to-br from-cyan-400/20 via-slate-900/70 to-slate-950 p-10 lg:flex">
        <div>
          <p class="bc-kicker">Team ready</p>
          <h2 class="mt-4 text-4xl font-semibold text-white">Bring your people into one board.</h2>
          <p class="mt-4 max-w-md text-sm text-slate-300">
            Create rooms, invite teammates, and keep progress in one shared visual workspace.
          </p>
        </div>
        <img class="mx-auto mt-10 max-h-72 rounded-2xl object-cover" src="assets/signup.jpg" alt="Signup illustration" />
      </div>
    </div>
  </div>
</section>
